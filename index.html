<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>TurboLane — 2P Prototype</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #0D0221;
    color: #F9F871;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    user-select: none;
  }
  #wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
  }
  #game {
    display: block;
    background: #1a0d2e;
    box-shadow: 0 0 60px rgba(249, 44, 133, 0.3);
    max-width: 100%;
    max-height: 100vh;
  }
  #overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(13, 2, 33, 0.92);
    z-index: 10;
    text-align: center;
    padding: 20px;
  }
  #overlay.hidden { display: none; }
  .panel {
    max-width: 720px;
  }
  h1 {
    font-size: 48px;
    color: #F92C85;
    text-shadow: 0 0 20px #F92C85;
    margin-bottom: 8px;
    letter-spacing: 4px;
  }
  h2 {
    font-size: 18px;
    color: #2DE2E6;
    margin: 20px 0 10px;
  }
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin: 20px 0;
    text-align: left;
  }
  .controls div {
    border: 2px solid #2DE2E6;
    padding: 14px;
    border-radius: 6px;
  }
  .controls .p1 { border-color: #F92C85; }
  .controls b { color: #F9F871; }
  kbd {
    background: #241734;
    border: 1px solid #F9F871;
    padding: 2px 6px;
    margin: 0 2px;
    border-radius: 3px;
    font-size: 12px;
  }
  button {
    background: #F92C85;
    color: #0D0221;
    border: none;
    padding: 12px 32px;
    font-family: inherit;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 2px;
    border-radius: 4px;
    margin-top: 16px;
  }
  button:hover { background: #F9F871; }
  .hint { font-size: 12px; opacity: 0.7; margin-top: 8px; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="1280" height="720"></canvas>
</div>

<div id="overlay">
  <div class="panel">
    <h1>TURBOLANE</h1>
    <div style="color:#2DE2E6">2D Racing — Local 2-Player Prototype</div>
    <h2>// KONTROLLER //</h2>
    <div class="controls">
      <div class="p1">
        <b style="color:#F92C85">OYUNCU 1 (pembe)</b><br><br>
        Gaz: <kbd>W</kbd><br>
        Fren: <kbd>S</kbd><br>
        Sol/Sağ: <kbd>A</kbd> <kbd>D</kbd><br>
        Drift: <kbd>Sol Shift</kbd><br>
        Nitro: <kbd>Space</kbd>
      </div>
      <div>
        <b style="color:#2DE2E6">OYUNCU 2 (turkuaz)</b><br><br>
        Gaz: <kbd>↑</kbd><br>
        Fren: <kbd>↓</kbd><br>
        Sol/Sağ: <kbd>←</kbd> <kbd>→</kbd><br>
        Drift: <kbd>Sağ Shift</kbd><br>
        Nitro: <kbd>Enter</kbd>
      </div>
    </div>
    <div class="hint">İlk 3 turu tamamlayan kazanır. Drift ile boost doldur, Nitro ile patlat.</div>
    <button id="startBtn">BAŞLA</button>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  const keys = Object.create(null);
  const blockDefault = new Set([
    'ArrowUp','ArrowDown','ArrowLeft','ArrowRight',
    'Space','ShiftLeft','ShiftRight','Enter'
  ]);
  window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (blockDefault.has(e.code)) e.preventDefault();
  });
  window.addEventListener('keyup', e => { keys[e.code] = false; });

  const PALETTE = {
    bg: '#1a0d2e',
    grass: '#0D3D28',
    road: '#2a2438',
    roadLine: '#F9F871',
    wall: '#F92C85',
    p1: '#F92C85',
    p2: '#2DE2E6',
    start: '#F9F871',
  };

  // Track definition — oval with inner island
  const TRACK = {
    outer: { x: 100, y: 100, w: 1680, h: 920 },   // world coords
    inner: { x: 500, y: 360, w: 880, h: 400 },
    startLine: { x: 940, y: 100, w: 12, h: 260 }, // between inner top & outer top
    checkpoints: [
      // each car must cross these in order before lap counts
      { x: 940, y: 230, r: 150, id: 0 },  // top (start/finish)
      { x: 1600, y: 560, r: 150, id: 1 }, // right
      { x: 940, y: 890, r: 150, id: 2 },  // bottom
      { x: 280, y: 560, r: 150, id: 3 },  // left
    ],
  };
  const WORLD_W = TRACK.outer.x + TRACK.outer.w + 100;
  const WORLD_H = TRACK.outer.y + TRACK.outer.h + 100;

  class Car {
    constructor({ x, y, angle, color, name, controls }) {
      this.x = x; this.y = y;
      this.angle = angle;
      this.vx = 0; this.vy = 0;
      this.color = color;
      this.name = name;
      this.controls = controls;
      this.boost = 50;
      this.nitroActive = false;
      this.driftIntensity = 0;
      this.nextCP = 1; // already on CP 0 at start
      this.lap = 0;
      this.lastCPTime = 0;
      this.smokeTrail = [];
      this.radius = 18;
    }

    update(dt, now) {
      const c = this.controls;
      const throttle = keys[c.accel] ? 1 : 0;
      const brake = keys[c.brake] ? 1 : 0;
      const left = keys[c.left] ? 1 : 0;
      const right = keys[c.right] ? 1 : 0;
      const drift = !!keys[c.drift];
      const wantNitro = !!keys[c.nitro] && this.boost > 0;

      const fwdX = Math.cos(this.angle);
      const fwdY = Math.sin(this.angle);

      const MAX_SPEED = wantNitro ? 520 : 360;
      const ACCEL = 480;
      const BRAKE = 680;
      const REVERSE_ACCEL = 220;

      // Apply throttle/brake along facing direction
      const forwardVel = this.vx * fwdX + this.vy * fwdY;
      if (throttle) {
        this.vx += fwdX * ACCEL * dt;
        this.vy += fwdY * ACCEL * dt;
      }
      if (brake) {
        if (forwardVel > 10) {
          this.vx -= fwdX * BRAKE * dt;
          this.vy -= fwdY * BRAKE * dt;
        } else {
          this.vx -= fwdX * REVERSE_ACCEL * dt;
          this.vy -= fwdY * REVERSE_ACCEL * dt;
        }
      }

      // Turning — scales with speed (can't turn when stopped, max at moderate speed)
      const speed = Math.hypot(this.vx, this.vy);
      const turnFactor = Math.min(speed / 80, 1);
      const baseTurn = 2.6;
      const driftTurnBonus = drift ? 1.5 : 1.0;
      const turnRate = baseTurn * turnFactor * driftTurnBonus;
      if (left)  this.angle -= turnRate * dt;
      if (right) this.angle += turnRate * dt;

      // Split velocity into forward + lateral
      const lateralX = this.vx - forwardVel * fwdX;
      const lateralY = this.vy - forwardVel * fwdY;

      // Friction: normal = high lateral (grip), drift = low lateral (slide)
      const lateralFriction = drift ? 1.4 : 6.5;

      this.vx -= lateralX * lateralFriction * dt;
      this.vy -= lateralY * lateralFriction * dt;

      // Rolling resistance when coasting
      if (!throttle && !brake) {
        const drag = Math.pow(0.985, 60 * dt);
        this.vx *= drag;
        this.vy *= drag;
      }

      // Boost meter fills while drifting at speed
      const curSpeed = Math.hypot(this.vx, this.vy);
      const lateralSpeed = Math.hypot(lateralX, lateralY);
      if (drift && curSpeed > 60) {
        this.boost = Math.min(100, this.boost + lateralSpeed * 0.08 * dt);
        this.driftIntensity = Math.min(1, this.driftIntensity + dt * 4);
      } else {
        this.driftIntensity = Math.max(0, this.driftIntensity - dt * 2.5);
      }

      // Nitro consumes boost, adds impulse
      this.nitroActive = wantNitro;
      if (wantNitro) {
        this.boost = Math.max(0, this.boost - 35 * dt);
        this.vx += fwdX * 260 * dt;
        this.vy += fwdY * 260 * dt;
      }

      // Clamp max speed — after nitro so it acts as the true ceiling
      const finalSpeed = Math.hypot(this.vx, this.vy);
      if (finalSpeed > MAX_SPEED) {
        this.vx = this.vx / finalSpeed * MAX_SPEED;
        this.vy = this.vy / finalSpeed * MAX_SPEED;
      }

      // Move
      this.x += this.vx * dt;
      this.y += this.vy * dt;

      // Smoke trail for drift
      if (this.driftIntensity > 0.2 && curSpeed > 60) {
        this.smokeTrail.push({
          x: this.x - fwdX * 16,
          y: this.y - fwdY * 16,
          t: now,
          r: 6 + this.driftIntensity * 8,
        });
      }
      this.smokeTrail = this.smokeTrail.filter(s => now - s.t < 700);

      // Checkpoints
      const cp = TRACK.checkpoints[this.nextCP];
      if (Math.hypot(this.x - cp.x, this.y - cp.y) < cp.r) {
        this.nextCP = (this.nextCP + 1) % TRACK.checkpoints.length;
        if (this.nextCP === 1) {
          this.lap++;
          this.lastCPTime = now;
        }
      }
    }

    collideTrack() {
      const R = this.radius;
      const o = TRACK.outer;
      const i = TRACK.inner;

      // Outer bounds (push in)
      if (this.x < o.x + R) { this.x = o.x + R; this.vx = Math.abs(this.vx) * 0.35; }
      if (this.x > o.x + o.w - R) { this.x = o.x + o.w - R; this.vx = -Math.abs(this.vx) * 0.35; }
      if (this.y < o.y + R) { this.y = o.y + R; this.vy = Math.abs(this.vy) * 0.35; }
      if (this.y > o.y + o.h - R) { this.y = o.y + o.h - R; this.vy = -Math.abs(this.vy) * 0.35; }

      // Inner island (push out)
      if (this.x > i.x - R && this.x < i.x + i.w + R &&
          this.y > i.y - R && this.y < i.y + i.h + R) {
        const dLeft  = Math.abs(this.x - (i.x - R));
        const dRight = Math.abs(this.x - (i.x + i.w + R));
        const dTop   = Math.abs(this.y - (i.y - R));
        const dBot   = Math.abs(this.y - (i.y + i.h + R));
        const m = Math.min(dLeft, dRight, dTop, dBot);
        if (m === dLeft)       { this.x = i.x - R;         this.vx = -Math.abs(this.vx) * 0.35; }
        else if (m === dRight) { this.x = i.x + i.w + R;   this.vx =  Math.abs(this.vx) * 0.35; }
        else if (m === dTop)   { this.y = i.y - R;         this.vy = -Math.abs(this.vy) * 0.35; }
        else                    { this.y = i.y + i.h + R;   this.vy =  Math.abs(this.vy) * 0.35; }
      }
    }

    draw(ctx, now) {
      // Smoke trail
      for (const s of this.smokeTrail) {
        const age = (now - s.t) / 700;
        ctx.globalAlpha = (1 - age) * 0.4;
        ctx.fillStyle = '#cccccc';
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * (1 + age), 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.angle);

      // Nitro flame
      if (this.nitroActive) {
        ctx.fillStyle = '#F9F871';
        ctx.beginPath();
        ctx.moveTo(-20, -6);
        ctx.lineTo(-36 - Math.random() * 8, 0);
        ctx.lineTo(-20, 6);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#F92C85';
        ctx.beginPath();
        ctx.moveTo(-20, -3);
        ctx.lineTo(-28 - Math.random() * 4, 0);
        ctx.lineTo(-20, 3);
        ctx.closePath();
        ctx.fill();
      }

      // Body
      ctx.fillStyle = this.color;
      ctx.fillRect(-20, -11, 40, 22);
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(-20, -11, 40, 4);

      // Cockpit
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(-4, -8, 12, 16);

      // Front indicator
      ctx.fillStyle = '#F9F871';
      ctx.fillRect(16, -10, 4, 20);

      ctx.restore();
    }
  }

  const P1 = new Car({
    x: 880, y: 230, angle: 0,
    color: PALETTE.p1, name: 'P1',
    controls: { accel:'KeyW', brake:'KeyS', left:'KeyA', right:'KeyD', drift:'ShiftLeft', nitro:'Space' }
  });
  const P2 = new Car({
    x: 880, y: 280, angle: 0,
    color: PALETTE.p2, name: 'P2',
    controls: { accel:'ArrowUp', brake:'ArrowDown', left:'ArrowLeft', right:'ArrowRight', drift:'ShiftRight', nitro:'Enter' }
  });

  // Camera
  const cam = { x: WORLD_W/2, y: WORLD_H/2, zoom: 0.6 };

  function updateCamera(dt) {
    const midX = (P1.x + P2.x) / 2;
    const midY = (P1.y + P2.y) / 2;
    const dist = Math.hypot(P1.x - P2.x, P1.y - P2.y);
    // Fit both with margin
    const targetZoom = Math.min(0.9, Math.max(0.35, 700 / (dist + 900)));
    const k = 1 - Math.pow(0.001, dt);
    cam.x += (midX - cam.x) * k * 8;
    cam.y += (midY - cam.y) * k * 8;
    cam.zoom += (targetZoom - cam.zoom) * k * 4;
  }

  function drawTrack() {
    const o = TRACK.outer;
    const i = TRACK.inner;

    // Grass background (wide)
    ctx.fillStyle = PALETTE.grass;
    ctx.fillRect(-200, -200, WORLD_W + 400, WORLD_H + 400);

    // Road (outer rect minus inner rect)
    ctx.fillStyle = PALETTE.road;
    ctx.fillRect(o.x, o.y, o.w, o.h);
    ctx.fillStyle = PALETTE.grass;
    ctx.fillRect(i.x, i.y, i.w, i.h);

    // Dashed middle line (decorative, around the center ring)
    ctx.strokeStyle = 'rgba(249,248,113,0.15)';
    ctx.setLineDash([20, 20]);
    ctx.lineWidth = 4;
    const mX = o.x + (i.x - o.x) / 2;
    const mY = o.y + (i.y - o.y) / 2;
    ctx.strokeRect(mX, mY,
      o.w - 2 * (i.x - o.x),
      o.h - 2 * (i.y - o.y)
    );
    ctx.setLineDash([]);

    // Outer wall
    ctx.strokeStyle = PALETTE.wall;
    ctx.lineWidth = 8;
    ctx.strokeRect(o.x, o.y, o.w, o.h);
    // Inner wall
    ctx.strokeStyle = '#2DE2E6';
    ctx.strokeRect(i.x, i.y, i.w, i.h);

    // Start/finish line (checker)
    const sl = TRACK.startLine;
    const stripeH = 20;
    for (let y = 0; y < sl.h; y += stripeH) {
      for (let x = 0; x < sl.w + 40; x += stripeH) {
        const isDark = ((x / stripeH + y / stripeH) % 2) < 1;
        ctx.fillStyle = isDark ? '#0D0221' : '#F9F871';
        ctx.fillRect(sl.x - 20 + x, sl.y + y, stripeH, stripeH);
      }
    }
  }

  function drawHUD() {
    // Reset any transform — HUD is screen-space
    const pad = 16;
    ctx.font = 'bold 14px monospace';

    // P1 panel
    ctx.fillStyle = 'rgba(13,2,33,0.7)';
    ctx.fillRect(pad, pad, 220, 78);
    ctx.strokeStyle = PALETTE.p1;
    ctx.lineWidth = 2;
    ctx.strokeRect(pad, pad, 220, 78);
    ctx.fillStyle = PALETTE.p1;
    ctx.fillText('OYUNCU 1', pad + 10, pad + 20);
    ctx.fillStyle = '#fff';
    ctx.fillText(`Hız: ${Math.round(Math.hypot(P1.vx, P1.vy))} u/s`, pad + 10, pad + 40);
    ctx.fillText(`Tur: ${P1.lap} / 3`, pad + 10, pad + 58);
    // Boost bar
    ctx.fillStyle = '#241734';
    ctx.fillRect(pad + 120, pad + 48, 90, 12);
    ctx.fillStyle = P1.nitroActive ? PALETTE.roadLine : PALETTE.p1;
    ctx.fillRect(pad + 120, pad + 48, 90 * P1.boost / 100, 12);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.strokeRect(pad + 120, pad + 48, 90, 12);

    // P2 panel (right)
    const rx = W - pad - 220;
    ctx.fillStyle = 'rgba(13,2,33,0.7)';
    ctx.fillRect(rx, pad, 220, 78);
    ctx.strokeStyle = PALETTE.p2;
    ctx.lineWidth = 2;
    ctx.strokeRect(rx, pad, 220, 78);
    ctx.fillStyle = PALETTE.p2;
    ctx.fillText('OYUNCU 2', rx + 10, pad + 20);
    ctx.fillStyle = '#fff';
    ctx.fillText(`Hız: ${Math.round(Math.hypot(P2.vx, P2.vy))} u/s`, rx + 10, pad + 40);
    ctx.fillText(`Tur: ${P2.lap} / 3`, rx + 10, pad + 58);
    ctx.fillStyle = '#241734';
    ctx.fillRect(rx + 120, pad + 48, 90, 12);
    ctx.fillStyle = P2.nitroActive ? PALETTE.roadLine : PALETTE.p2;
    ctx.fillRect(rx + 120, pad + 48, 90 * P2.boost / 100, 12);
    ctx.strokeStyle = '#fff';
    ctx.strokeRect(rx + 120, pad + 48, 90, 12);

    // Winner banner
    if (state.winner) {
      ctx.fillStyle = 'rgba(13,2,33,0.85)';
      ctx.fillRect(0, H/2 - 80, W, 160);
      ctx.textAlign = 'center';
      ctx.font = 'bold 56px monospace';
      ctx.fillStyle = state.winner === 'P1' ? PALETTE.p1 : PALETTE.p2;
      ctx.fillText(`${state.winner} KAZANDI!`, W/2, H/2 + 8);
      ctx.font = 'bold 18px monospace';
      ctx.fillStyle = '#fff';
      ctx.fillText('R tuşu ile yeniden başla', W/2, H/2 + 48);
      ctx.textAlign = 'left';
    }
  }

  function collideCarVsCar(a, b) {
    const dx = b.x - a.x;
    const dy = b.y - a.y;
    const dist = Math.hypot(dx, dy);
    const minDist = a.radius + b.radius;
    if (dist >= minDist || dist === 0) return;

    // Push apart equally
    const nx = dx / dist;
    const ny = dy / dist;
    const overlap = (minDist - dist) / 2;
    a.x -= nx * overlap;
    a.y -= ny * overlap;
    b.x += nx * overlap;
    b.y += ny * overlap;

    // Elastic velocity exchange along collision normal
    const relV = (a.vx - b.vx) * nx + (a.vy - b.vy) * ny;
    if (relV > 0) { // only resolve if approaching
      a.vx -= relV * nx;
      a.vy -= relV * ny;
      b.vx += relV * nx;
      b.vy += relV * ny;
    }
  }

  const state = {
    winner: null,
    running: false,
  };

  function reset() {
    P1.x = 880; P1.y = 230; P1.angle = 0; P1.vx = 0; P1.vy = 0;
    P1.boost = 50; P1.lap = 0; P1.nextCP = 1; P1.smokeTrail = [];
    P2.x = 880; P2.y = 280; P2.angle = 0; P2.vx = 0; P2.vy = 0;
    P2.boost = 50; P2.lap = 0; P2.nextCP = 1; P2.smokeTrail = [];
    state.winner = null;
  }

  window.addEventListener('keydown', e => {
    if (e.code === 'KeyR' && state.winner) reset();
  });

  let last = performance.now();
  function loop(now) {
    const dt = Math.min(1/30, (now - last) / 1000);
    last = now;

    if (state.running && !state.winner) {
      P1.update(dt, now);
      P2.update(dt, now);
      P1.collideTrack();
      P2.collideTrack();
      collideCarVsCar(P1, P2);

      if (P1.lap >= 3) state.winner = 'P1';
      else if (P2.lap >= 3) state.winner = 'P2';
    }
    updateCamera(dt);

    // Clear
    ctx.fillStyle = PALETTE.bg;
    ctx.fillRect(0, 0, W, H);

    // World space
    ctx.save();
    ctx.translate(W/2, H/2);
    ctx.scale(cam.zoom, cam.zoom);
    ctx.translate(-cam.x, -cam.y);

    drawTrack();
    P1.draw(ctx, now);
    P2.draw(ctx, now);

    ctx.restore();

    // Screen space
    drawHUD();

    requestAnimationFrame(loop);
  }

  document.getElementById('startBtn').addEventListener('click', () => {
    document.getElementById('overlay').classList.add('hidden');
    state.running = true;
  });

  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
